<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calculator">
    <h1 class="title">Calculator</h1>
    <button class="toggle-btn" id="toggleMode">🌙 Dark</button>
    
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <button class="btn clear" id="ac">AC</button>
      <button class="btn delete" id="del">DEL</button>
      <button class="btn operator" id="per">%</button>
      <button class="btn operator" id="div">÷</button>

      <button class="btn" id="n7">7</button>
      <button class="btn" id="n8">8</button>
      <button class="btn" id="n9">9</button>
      <button class="btn operator" id="mul">×</button>

      <button class="btn" id="n4">4</button>
      <button class="btn" id="n5">5</button>
      <button class="btn" id="n6">6</button>
      <button class="btn operator" id="sub">−</button>

      <button class="btn" id="n1">1</button>
      <button class="btn" id="n2">2</button>
      <button class="btn" id="n3">3</button>
      <button class="btn operator" id="add">+</button>

      <button class="btn zero" id="n0">0</button>
      <button class="btn" id="dot">.</button>
      <button class="btn equals" id="eq">=</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
